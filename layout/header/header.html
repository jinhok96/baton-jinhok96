<!--@js(/layout/header/header.js)-->

<header id="header" class="bg-primary sticky top-0 left-0 z-50 px-4 py-3 md:px-6 md:py-4">
  <div class="flex w-full items-center justify-between">
    <!-- 로고 -->
    <h1 class="text-l5 text-primary md:w-43" module="Layout_LogoTop">
      <a href="/index.html">{$mall_name}</a>
    </h1>

    <!-- 카테고리 nav (데스크톱만) -->
    <nav class="hidden md:block" aria-label="카테고리 메뉴">
      <div module="Layout_category">
        <ul class="flex items-center gap-6">
          <li><a href="{$link_product_list}" class="text-l5 text-primary">{$name_or_img_tag}</a></li>
          <li><a href="{$link_product_list}" class="text-l5 text-primary">{$name_or_img_tag}</a></li>
          <li><a href="{$link_product_list}" class="text-l5 text-primary">{$name_or_img_tag}</a></li>
        </ul>
      </div>
    </nav>

    <!-- 유틸리티 -->
    <div class="flex items-center gap-5">
      <!-- 메뉴 버튼 (모바일/태블릿만) -->
      <button type="button" class="text-p4 text-secondary md:hidden" id="btnDrawerOpen" aria-label="메뉴 열기">
        메뉴
      </button>

      <!-- 검색 -->
      <button type="button" class="text-p4 text-secondary hover:underline" aria-label="검색">검색</button>

      <!-- 로그인 / 로그아웃 -->
      <div>
        <div module="Layout_statelogoff" class="text-p4 text-secondary">
          <a href="/member/login.html">로그인</a>
        </div>
        <div module="Layout_stateLogon" class="text-p4 text-secondary">
          <a href="{$action_logout}">로그아웃</a>
        </div>
      </div>

      <!-- 장바구니 -->
      <div module="Layout_OrderBasketcount" class="text-p4 text-secondary">
        <a href="/order/basket.html" class="flex items-center gap-1">
          장바구니
          <span class="flex size-4 items-center justify-center rounded-full bg-gray-600">
            <span class="text-c3 text-on-color">{$basket_count}</span>
          </span>
        </a>
      </div>
    </div>
  </div>
</header>

<!-- 모바일/태블릿 드로어 메뉴 -->
<div
  id="slideMenuWrap"
  class="bg-primary fixed inset-0 z-300 -translate-x-full transition-transform duration-300 md:hidden"
  aria-hidden="true"
>
  <!-- 1depth 패널 -->
  <div id="drawerPanel1" class="flex h-full flex-col">
    <div class="flex items-center justify-between px-4 py-3">
      <span class="text-l5 text-primary">{$mall_name}</span>
      <button type="button" class="text-p4 text-secondary" id="btnDrawerClose" aria-label="메뉴 닫기">닫기</button>
    </div>
    <div class="flex-1 overflow-y-auto">
      <ul id="drawerCateList" module="layout_category">
        <li
          id="cate{$cate_no}"
          class="drawer__cate-item border-color-primary flex items-center justify-between border-b px-4"
        >
          <a href="{$link_product_list}" class="drawer__cate-link view text-h4 text-primary flex-1 py-5">{$name}</a>
          <button
            type="button"
            class="drawer__cate-arrow cate flex items-center py-5"
            cate="{$param}"
            aria-label="하위메뉴"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              fill="none"
              viewBox="0 0 20 20"
              aria-hidden="true"
            >
              <path
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M7.5 5l5 5-5 5"
              />
            </svg>
          </button>
        </li>
        <li
          id="cate{$cate_no}"
          class="drawer__cate-item border-color-primary flex items-center justify-between border-b px-4"
        >
          <a href="{$link_product_list}" class="drawer__cate-link view text-h4 text-primary flex-1 py-5">{$name}</a>
          <button
            type="button"
            class="drawer__cate-arrow cate flex items-center py-5"
            cate="{$param}"
            aria-label="하위메뉴"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              fill="none"
              viewBox="0 0 20 20"
              aria-hidden="true"
            >
              <path
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M7.5 5l5 5-5 5"
              />
            </svg>
          </button>
        </li>
      </ul>
    </div>
    <div class="border-color-primary flex flex-col gap-4 border-t px-4 py-5">
      <a href="/member/login.html" class="text-p4 text-secondary">로그인</a>
      <a href="/board/free/list.html?board_no=1" class="text-p4 text-secondary">공지사항</a>
      <a href="/board/free/list.html?board_no=3" class="text-p4 text-secondary">자주 묻는 질문</a>
    </div>
  </div>

  <!-- 2depth 패널 -->
  <div
    id="drawerPanel2"
    class="bg-primary absolute inset-0 flex translate-x-full flex-col transition-transform duration-300"
  >
    <div class="flex items-center justify-between px-4 py-3">
      <span></span>
      <button type="button" class="text-p4 text-secondary" id="btnDrawerClose2" aria-label="메뉴 닫기">닫기</button>
    </div>
    <div class="px-4 py-3">
      <button type="button" class="flex items-center gap-0.5" id="btnDrawerBack">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="20"
          height="20"
          fill="none"
          viewBox="0 0 20 20"
          aria-hidden="true"
        >
          <path
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12.5 15l-5-5 5-5"
          />
        </svg>
        <span class="text-l4 text-primary" id="drawerBackLabel"></span>
      </button>
    </div>
    <div class="flex-1 overflow-y-auto">
      <ul class="px-4" id="drawerSubList"></ul>
    </div>
  </div>
</div>
<div
  id="drawerBackdrop"
  class="pointer-events-none fixed inset-0 z-299 bg-black/50 opacity-0 transition-opacity duration-300"
></div>
