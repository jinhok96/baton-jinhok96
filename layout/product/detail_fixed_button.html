<div class="md:hidden" module="product_detail">
  <!--@js(/layout/product/detail_fixed_button.js)-->

  <!-- 백드롭 -->
  <div
    id="fixedSheetBackdrop"
    class="pointer-events-none fixed inset-0 z-50 bg-black/40 opacity-0 transition-opacity duration-300"></div>

  <!-- 바텀 시트 -->
  <div
    id="fixedSheet"
    class="bg-primary shadow-500 fixed inset-x-0 bottom-0 z-50 flex h-[90vh] translate-y-full flex-col rounded-t-lg transition-transform duration-300">
    <!-- 헤더 -->
    <div class="border-color-primary relative flex shrink-0 items-center justify-between border-b px-4 py-4">
      <span class="text-l5 text-primary w-full text-center">옵션 선택</span>
      <button id="fixedSheetClose" class="absolute top-4 right-4 size-6 text-(--color-icon-primary)">
        <!--@import(/svg/icon/close.html)-->
      </button>
    </div>

    <!-- 스크롤 영역 (productScrollArea가 JS로 이동됨) -->
    <div id="fixedSheetScrollContent" class="flex flex-1 flex-col overflow-y-auto"></div>

    <!-- 하단 고정 액션 버튼 (productActionArea가 JS로 이동됨) -->
    <div id="fixedSheetActionContent" class="border-color-primary flex flex-col gap-2 border-t px-4 py-2"></div>
  </div>

  <!-- 하단 고정 버튼 바 -->
  <div class="border-color-primary bg-primary fixed inset-x-0 bottom-0 z-40 border-t px-4 py-3">
    <button
      id="fixedSheetOpen"
      class="border-color-tertiary text-primary text-l5 flex w-full items-center justify-center rounded-xs border px-4 py-3">
      바로 구매하기
    </button>
  </div>
</div>
