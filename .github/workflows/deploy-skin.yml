name: Deploy Skin

on:
  push:
    branches: [main, dev]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Tailwind CSS
        run: npm run build

      - name: Set skin path
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "SKIN_PATH=/skin5/" >> $GITHUB_ENV
          else
            echo "SKIN_PATH=/skin6/" >> $GITHUB_ENV
          fi

      - name: Install lftp & sshpass
        run: sudo apt-get install -y lftp sshpass

      - name: Deploy via SFTP
        env:
          SSHPASS: ${{ secrets.CAFE24_PASS }}
          CAFE24_HOST: ${{ secrets.CAFE24_HOST }}
          CAFE24_PORT: ${{ secrets.CAFE24_PORT }}
          CAFE24_USER: ${{ secrets.CAFE24_USER }}
        run: |
          lftp <<LFTP
          set sftp:connect-program "sshpass -e ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          open -u $CAFE24_USER,$SSHPASS sftp://$CAFE24_HOST:$CAFE24_PORT
          mirror -R --parallel=4 --exclude-glob=*.json --exclude-glob=*.yml --exclude-glob=*.md --exclude-glob=.prettierrc --exclude-glob=.prettierignore --exclude-glob=eslint.config.mjs --exclude-glob=.gitattributes --exclude-glob=.editorconfig --exclude-glob=.gitignore --exclude=^\.git --exclude=^\.github --exclude=^\.vscode --exclude=^\.claude --exclude=^node_modules --exclude=^src ./ $SKIN_PATH
          quit
          LFTP
